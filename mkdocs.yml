site_name: Open Agent Harness
site_description: 面向企业级大规模 workspace 并行场景的自由 Agent Harness 文档站
site_url: https://fairyshine.github.io/OpenAgentHarness/
repo_url: https://github.com/fairyshine/OpenAgentHarness
repo_name: fairyshine/OpenAgentHarness
edit_uri: edit/master/docs/

docs_dir: docs
site_dir: site
exclude_docs: /README.md

theme:
  name: material
  language: zh
  logo: assets/oah-aqua-mark.svg
  favicon: assets/oah-aqua-favicon.svg
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: zh
          default: true
          name: 简体中文
          build: true
          link: /
          site_description: 面向企业级大规模 workspace 并行场景的自由 Agent Harness 文档站
          theme:
            language: zh
        - locale: en
          name: English
          build: true
          link: /en/
          site_description: Documentation for a flexible enterprise agent harness built for large-scale parallel workspace usage
          theme:
            language: en
          nav_translations:
            首页: Home
            快速开始: Quick Start
            部署与运行: Deploy and Run
            设计总览: Overview
            架构设计: Architecture
            架构总览: Architecture Overview
            领域模型: Domain Model
            服务端配置: Server Config
            调试 CLI / TUI: Debug CLI / TUI
            API 设计: API Design
            当前进度: Project Roadmap
            存储设计: Storage Design
            实施路线: Implementation Roadmap
            导航: Overview
            规范索引: Spec Index
            Agent 定义: Agent Definition
            Agent 控制项: Agent Controls
            加载与校验: Loading and Validation
            项目级 AGENTS: Project AGENTS
            运行时设计: Runtime Design
            生命周期: Lifecycle
            上下文引擎: Context Engine
            消息投影: Message Projections
            模型网关: Model Gateway
            执行后端: Execution Backend
            Projection 与 Executors: Projection and Executors
            Queue 与可靠性: Queue and Reliability
            事件与审计: Events and Audit
            概览: Overview
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - 部署与运行: deploy.md
  - 设计总览: design-overview.md
  - 架构设计:
      - 架构总览: architecture-overview.md
      - 领域模型: domain-model.md
      - 服务端配置: server-config.md
      - 调试 CLI / TUI: debug-cli-tui.md
      - API 设计: api-design.md
      - 当前进度: project-roadmap.md
      - 存储设计: storage-design.md
      - 实施路线: implementation-roadmap.md
  - Workspace:
      - 导航: workspace/README.md
      - 规范索引: workspace-spec.md
      - AGENTS: workspace/agents.md
      - Agent 定义: workspace/agents-definition.md
      - Agent 控制项: workspace/agents-controls.md
      - Actions: workspace/actions.md
      - Skills: workspace/skills.md
      - Models: workspace/models.md
      - Providers: workspace/model-providers.md
      - Settings: workspace/settings.md
      - 加载与校验: workspace/loading-and-validation.md
      - Hooks: workspace/hooks.md
      - Hooks Protocol: workspace/hooks-protocol.md
      - Hooks Events: workspace/hooks-events.md
      - Hooks Handlers: workspace/hooks-handlers.md
      - MCP: workspace/mcp.md
      - 项目级 AGENTS: workspace/agents-project.md
  - Runtime:
      - 导航: runtime/README.md
      - 运行时设计: runtime-design.md
      - 生命周期: runtime/lifecycle.md
      - 上下文引擎: runtime/context-engine.md
      - 消息投影: runtime/message-projections.md
      - 模型网关: runtime/model-gateway.md
      - 执行后端: runtime/execution-backend.md
      - Hook Runtime: runtime/hook-runtime.md
      - Projection 与 Executors: runtime/projection-and-executors.md
      - Queue 与可靠性: runtime/queue-and-reliability.md
      - 事件与审计: runtime/events-and-audit.md
  - OpenAPI:
      - 导航: openapi/README.md
      - 概览: openapi/overview.md
      - Workspaces: openapi/workspaces.md
      - Sessions: openapi/sessions.md
      - Runs: openapi/runs.md
      - Actions: openapi/actions.md
      - Models: openapi/models.md
      - Streaming: openapi/streaming.md
      - Components: openapi/components.md
  - Schemas:
      - 导航: schemas/README.md
