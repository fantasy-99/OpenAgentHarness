nameOverride: ""
fullnameOverride: ""
commonLabels: {}

global:
  clusterDomain: cluster.local

image:
  repository: ghcr.io/open-agent-harness/open-agent-harness
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

config:
  create: true
  nameOverride: ""
  mountPath: /etc/oah
  serverYaml: |
    server:
      host: 0.0.0.0
      port: 8787

    storage:
      postgres_url: ${env.DATABASE_URL}
      redis_url: ${env.REDIS_URL}

    paths:
      workspace_dir: /var/lib/oah/workspaces
      runtime_dir: /var/lib/oah/runtimes
      model_dir: /var/lib/oah/models
      tool_dir: /var/lib/oah/tools
      skill_dir: /var/lib/oah/skills

    workspace:
      materialization:
        idle_ttl_ms: 1800000
        maintenance_interval_ms: 15000

    workers:
      standalone:
        min_replicas: {{ .Values.worker.replicaCount }}
        max_replicas: 12
        slots_per_pod: 2
        ready_sessions_per_capacity_unit: 1
        reserved_capacity_for_subagent: 1
      controller:
        scale_interval_ms: 5000
        scale_up_window: 2
        scale_down_window: 4
        cooldown_ms: 10000
        scale_up_busy_ratio_threshold: 0.75
        scale_up_max_ready_age_ms: 5000
        leader_election:
          type: kubernetes
          kubernetes:
            namespace: {{ .Release.Namespace }}
            lease_name: {{ include "open-agent-harness.controllerName" . }}
        scale_target:
          type: kubernetes
          allow_scale_down: true
          kubernetes:
            namespace: {{ .Release.Namespace }}
            label_selector: app.kubernetes.io/instance={{ .Release.Name }},app.kubernetes.io/component=sandbox

    llm:
      default_model: openai-default

apiServer:
  enabled: true
  replicaCount: 1
  minReadySeconds: 5
  terminationGracePeriodSeconds: 30
  nodeOptions: "--max-old-space-size=320"
  runtimeOptimizations:
    allowPrivateInternalModelRoutes: true
    workspacePrewarmEnabled: false
    objectStorageTrustManagedPrefixes: true
  priorityClassName: ""
  podSecurityContext: {}
  securityContext: {}
  topologySpreadConstraints: []
  strategy:
    maxUnavailable: 0
    maxSurge: 1
  podDisruptionBudget:
    enabled: false
    minAvailable: ""
    maxUnavailable: ""
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources: {}
  extraEnv: []
  envFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  serviceAnnotations: {}
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
  service:
    port: 8787
    type: ClusterIP
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: oah.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

worker:
  enabled: true
  replicaCount: 1
  minReadySeconds: 5
  terminationGracePeriodSeconds: 120
  nodeOptions: "--max-old-space-size=224"
  runtimeOptimizations:
    allowPrivateInternalRoutes: true
    objectStorageTrustManagedPrefixes: true
  drain:
    timeoutMs: 110000
    timeoutStrategy: requeue_running
    preStop:
      enabled: true
      path: /internal/v1/control/drain
      delayMs: 5000
  priorityClassName: ""
  podSecurityContext: {}
  securityContext: {}
  topologySpreadConstraints: []
  strategy:
    maxUnavailable: 0
    maxSurge: 1
  podDisruptionBudget:
    enabled: false
    minAvailable: ""
    maxUnavailable: ""
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources: {}
  extraEnv: []
  envFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  serviceAnnotations: {}
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
  service:
    port: 8787
  workspaceVolume:
    type: emptyDir
    mountPath: /var/lib/oah/workspaces
    emptyDir:
      sizeLimit: 8Gi
    persistentVolumeClaim:
      claimName: ""
      readOnly: false

controller:
  enabled: true
  replicaCount: 1
  minReadySeconds: 5
  terminationGracePeriodSeconds: 30
  nodeOptions: "--max-old-space-size=80"
  priorityClassName: ""
  podSecurityContext: {}
  securityContext: {}
  topologySpreadConstraints: []
  strategy:
    maxUnavailable: 0
    maxSurge: 1
  podDisruptionBudget:
    enabled: false
    minAvailable: ""
    maxUnavailable: ""
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources: {}
  extraEnv: []
  envFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  rbac:
    create: true
  service:
    port: 8788
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /metrics
      prometheus.io/port: "8788"

serviceMonitor:
  enabled: false
  additionalLabels: {}
  interval: 15s
  scrapeTimeout: 5s

prometheusRule:
  enabled: false
  additionalLabels: {}
  severities:
    noLeader: critical
    scaleTargetError: warning
    rolloutStuck: warning
    scaleDownBlocked: info
  durations:
    noLeader: 2m
    scaleTargetError: 10m
    rolloutStuck: 10m
    scaleDownBlocked: 15m

grafanaDashboard:
  enabled: false
  additionalLabels: {}
  sidecarLabel: grafana_dashboard
  sidecarLabelValue: "1"

networkPolicy:
  enabled: false
  allowSameNamespace: true
  monitoring:
    enabled: false
    namespaceSelector: {}
    podSelector: {}
  apiServer:
    enabled: false
    extraIngress: []
    egress:
      enabled: false
      allowSameNamespace: true
      allowDns: true
      allowKubernetesApi: false
      allowRedis: false
      allowPostgres: false
      allowObjectStorage: false
      allowModelGateway: false
      extraRules: []
  worker:
    enabled: true
    extraIngress: []
    egress:
      enabled: false
      allowSameNamespace: true
      allowDns: true
      allowKubernetesApi: false
      allowRedis: false
      allowPostgres: false
      allowObjectStorage: false
      allowModelGateway: false
      extraRules: []
  controller:
    enabled: true
    extraIngress: []
    egress:
      enabled: false
      allowSameNamespace: true
      allowDns: true
      allowKubernetesApi: true
      allowRedis: true
      allowPostgres: false
      allowObjectStorage: false
      allowModelGateway: false
      extraRules: []
  egress:
    dependencies:
      dns:
        peers:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
            podSelector:
              matchExpressions:
                - key: k8s-app
                  operator: In
                  values:
                    - kube-dns
                    - coredns
        ports:
          - protocol: UDP
            port: 53
          - protocol: TCP
            port: 53
      kubernetesApi:
        cidrs: []
        ports:
          - protocol: TCP
            port: 443
      redis:
        peers: []
        ports:
          - protocol: TCP
            port: 6379
      postgres:
        peers: []
        ports:
          - protocol: TCP
            port: 5432
      objectStorage:
        peers: []
        ports:
          - protocol: TCP
            port: 443
          - protocol: TCP
            port: 80
      modelGateway:
        peers: []
        ports:
          - protocol: TCP
            port: 443
          - protocol: TCP
            port: 80
