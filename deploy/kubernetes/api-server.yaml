apiVersion: apps/v1
kind: Deployment
metadata:
  name: oah-api-server
  labels:
    app.kubernetes.io/name: oah-api-server
    app.kubernetes.io/component: api-server
    app.kubernetes.io/part-of: open-agent-harness
spec:
  replicas: 1
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oah-api-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oah-api-server
        app.kubernetes.io/component: api-server
        app.kubernetes.io/part-of: open-agent-harness
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api-server
          image: ghcr.io/open-agent-harness/open-agent-harness:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "apps/server/dist/index.js", "--config", "/etc/oah/server.yaml", "--api-only"]
          ports:
            - containerPort: 8787
              name: http
          env:
            - name: OAH_CONFIG
              value: /etc/oah/server.yaml
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          volumeMounts:
            - name: oah-config
              mountPath: /etc/oah
              readOnly: true
      volumes:
        - name: oah-config
          configMap:
            name: oah-config
---
apiVersion: v1
kind: Service
metadata:
  name: oah-api-server
spec:
  selector:
    app.kubernetes.io/name: oah-api-server
  ports:
    - name: http
      port: 8787
      targetPort: http
