apiVersion: apps/v1
kind: Deployment
metadata:
  name: oah-controller
  labels:
    app.kubernetes.io/name: oah-controller
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: open-agent-harness
spec:
  replicas: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oah-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oah-controller
        app.kubernetes.io/component: controller
        app.kubernetes.io/part-of: open-agent-harness
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: oah-controller
      containers:
        - name: controller
          image: ghcr.io/open-agent-harness/open-agent-harness:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "apps/controller/dist/index.js", "--config", "/etc/oah/server.yaml"]
          ports:
            - name: http
              containerPort: 8788
          env:
            - name: OAH_CONFIG
              value: /etc/oah/server.yaml
            - name: OAH_CONTROLLER_LEADER_ELECTION_TYPE
              value: kubernetes
            - name: OAH_CONTROLLER_LEASE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OAH_CONTROLLER_LEASE_NAME
              value: oah-controller
            - name: OAH_CONTROLLER_TARGET_TYPE
              value: kubernetes
            - name: OAH_CONTROLLER_TARGET_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OAH_CONTROLLER_TARGET_LABEL_SELECTOR
              value: app.kubernetes.io/component=worker
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          volumeMounts:
            - name: oah-config
              mountPath: /etc/oah
              readOnly: true
      volumes:
        - name: oah-config
          configMap:
            name: oah-config
---
apiVersion: v1
kind: Service
metadata:
  name: oah-controller
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "8788"
spec:
  selector:
    app.kubernetes.io/name: oah-controller
  ports:
    - name: http
      port: 8788
      targetPort: http
