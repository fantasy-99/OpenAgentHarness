default_agent: builder

models:
  default:
    ref: platform/openai-default
    temperature: 0.2
    top_p: 0.9

system_prompt:
  base:
    inline: |-
      You are Open Agent Harness running inside the current workspace.
      Prefer workspace-local files, conventions, and tools.
      Be explicit about assumptions and keep outputs actionable.

  llm_optimized:
    providers:
      openai:
        inline: |-
          Be concise, tool-oriented, and precise with file paths.

  compose:
    order:
      - base
      - llm_optimized
      - agent
      - project_agents_md
      - skills
      - actions
